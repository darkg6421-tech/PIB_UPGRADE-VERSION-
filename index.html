<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    /* Layer 1: Deep background */
    background-color: #0a0a1a;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
  }

  /* Aurora Blobs (Peeche ki roshni) */
  .aurora {
    position: absolute;
    border-radius: 50%;
    filter: blur(150px);
    opacity: 0.6;
    animation: float 8s infinite alternate ease-in-out;
  }
  .blob1 { width: 500px; height: 500px; background: #ff2a75; top: -200px; left: -100px; }
  .blob2 { width: 400px; height: 400px; background: #00d4ff; bottom: -150px; right: -50px; animation-delay: 3s; }
  .blob3 { width: 350px; height: 350px; background: #7b2cbf; top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: 6s; }

  @keyframes float {
    0% { transform: translate(0, 0) scale(1); }
    100% { transform: translate(30px, -30px) scale(1.1); }
  }

  /* Layer 2: The Glass Card */
  .glass-card {
    position: relative;
    width: 500px;
    padding: 40px;
    border-radius: 24px;
    
    /* The Magic Glass Effect */
    background: rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(40px); /* <--- Asli Glass ka hero */
    -webkit-backdrop-filter: blur(40px);
    
    /* The 3D Border (Extra shine) */
    border-top: 1px solid rgba(255, 255, 255, 0.4);
    border-left: 1px solid rgba(255, 255, 255, 0.3);
    border-right: 1px solid rgba(255, 255, 255, 0.1);
    border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    z-index: 2;
    color: white;
  }

  .glass-card h1 {
    font-size: 2.5rem;
    font-weight: 600;
    margin: 0 0 15px;
    text-shadow: 0 5px 15px rgba(0,0,0,0.3);
  }

  .glass-card p {
    font-size: 1.1rem;
    line-height: 1.6;
    opacity: 0.8;
    margin: 0 0 25px;
  }

  /* Glass Button inside Glass Card (Double Glass!) */
  .glass-btn {
    padding: 12px 30px;
    border-radius: 50px;
    background: rgba(255, 255, 255, 0.2);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255, 255, 255, 0.5);
    color: white;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
  }
  .glass-btn:hover {
    background: rgba(255, 255, 255, 0.35);
  }
</style>

<!-- HTML Structure -->
<div class="aurora blob1"></div>
<div class="aurora blob2"></div>
<div class="aurora blob3"></div>

<div class="glass-card">
  <h1>✨ Premium Glass UI</h1>
  <p>Yeh hai woh world-class interface jisme frosted glass, live aurora gradients aur depth ka perfection hai.</p>
  <button class="glass-btn">Get Started</button>
</div>
